<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MySchool</title>
  </head>
  <body>
    <div id="app">
      <header>
        <a href="/index.html"><h1>MySchool</h1></a>
        <nav>
          <ul>
            <li>
              <a
                href="/src/pages/cadastrarCurso.html"
                class="has-tooltip"
                data-tooltip="Cursos"
              >
                <img src="/icons/cursos.png" alt="Cursos" />
              </a>
            </li>
          </ul>
        </nav>
      </header>
      <main>
        <section>
          <h2>Cursos Cadastrados no Sistema</h2>
          <div class="cursos-cadastrados">
            <p>Nenhum curso cadastrado ainda.</p>
          </div>
        </section>

        <section>
          <h2>Formulário de Cadastro de Curso</h2>
          <form id="form-curso">
            <label>
              Nome do Curso
              <input
                type="text"
                name="nome"
                placeholder="Digite o nome do curso"
                required
              />
            </label>

            <label>
              Período
              <input
                type="number"
                name="periodo"
                min="1"
                placeholder="Digite o período"
                required
              />
            </label>

            <div>
              <button type="submit">Cadastrar</button>
              <button type="reset">Limpar</button>
            </div>
          </form>
        </section>
      </main>
      <footer>
        <p>Seu ensino sobre controle. Developed by Allan, Ashley e Erik.</p>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
